name: Release frontend artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a version label (used as suffix on the tarball)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build + SHA256 + release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json

      - name: Install + build workspace/web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Compute SHA256 + pack tarball
        id: pack
        env:
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || (inputs.version || github.ref_name) }}
        run: |
          set -euo pipefail
          VERSION="${TAG}"
          OUT_DIR="dist/$VERSION"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          # Vite 7 emits to web/dist/ (not web/build/). Anything still under
          # web/build/ is a stale SvelteKit-era artifact.
          cp -R web/dist/. "$OUT_DIR/"

          TARBALL_NAME="frontend-${VERSION}.tar.gz"
          TARBALL="dist/${TARBALL_NAME}"
          tar -C "$OUT_DIR" -czf "$TARBALL" .

          SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          SHA_FILE="${TARBALL}.sha256"
          {
            echo "${SHA}  ${TARBALL_NAME}"
            echo "# Build version : ${VERSION}"
            echo "# Built at UTC  : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Node          : $(node --version)"
            echo "# Commit SHA    : ${GITHUB_SHA}"
          } > "$SHA_FILE"

          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}"    >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"         >> "$GITHUB_OUTPUT"
          echo "sha_file=${SHA_FILE}"  >> "$GITHUB_OUTPUT"
          echo "## Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- artifact: \`${TARBALL_NAME}\` ($(du -h "$TARBALL" | awk '{print $1}'))" >> "$GITHUB_STEP_SUMMARY"
          echo "- sha256:   \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.sha_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload sha as workflow artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ steps.pack.outputs.version }}
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.sha_file }}
