  <script>
    // Full-page reload for specific links (opzionale: può essere migrato in React)
    (function () {
      function isFullPageLink(href) {
        if (!href || typeof href !== 'string') return false;
        var p = href.split('?')[0].replace(/\/$/, '');
        return p === '/dashboard-channels' || p === '/youtube-suite' || p === '/youtube/upload' || p.indexOf('/dashboard-channels/') === 0 || p.indexOf('/youtube-suite/') === 0 || p.indexOf('/youtube/upload/') === 0;
      }
      document.addEventListener("click", function (e) {
        var a = e.target && (e.target.closest ? e.target.closest('a') : (function walk(n) { while (n && n !== document.body) { if (n.tagName === 'A') return n; n = n.parentNode; } return null; })(e.target));
        if (!a || !a.href) return;
        var href = a.getAttribute('href');
        if (!isFullPageLink(href)) return;
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        window.location.assign(href);
        return false;
      }, true);
    })();
  </script>
